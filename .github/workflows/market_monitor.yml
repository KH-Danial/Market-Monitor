name: 🕵️ Market Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: market-monitor
  cancel-in-progress: false

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: 📥 دریافت کدهای مخزن اصلی
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 نصب نیازمندی‌ها
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 🔍 اجرای اسکریپت تحلیل
        run: python fetch_and_analyze.py
        continue-on-error: true

      - name: 💾 ثبت تغییرات در مخزن ai-jury
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          git clone https://x-access-token:${GH_TOKEN}@github.com/KH-Danial/ai-jury.git /tmp/ai-jury
          
          cp -f price_history.json /tmp/ai-jury/ 2>/dev/null || true
          cp -f README.md /tmp/ai-jury/ 2>/dev/null || true
          cp -f market_report.json /tmp/ai-jury/ 2>/dev/null || true
          cp -f latest.json /tmp/ai-jury/ 2>/dev/null || true
          cp -f index.html /tmp/ai-jury/ 2>/dev/null || true
          
          cd /tmp/ai-jury
          git add .
          if git diff --staged --quiet; then
            echo "📝 تغییری برای commit وجود ندارد"
          else
            git commit -m "به‌روزرسانی خودکار بازار - $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ تغییرات با موفقیت به ai-jury push شد"
          fi
